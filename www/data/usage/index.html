<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#020617">

<title>Usage</title>

<style>
body {
  background: radial-gradient(circle at top left, #0f172a, #020617 70%);
  color: white;
  font-family: 'Inter', system-ui, sans-serif;
  margin: 0;
  min-height: 100dvh;
  font-size: 18px;
}

body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 120px;
  background: radial-gradient(circle, rgba(59,130,246,0.25), transparent 70%);
  pointer-events: none;
}

html {
  background: #020617;
}

.container {
  padding:14px;
  max-width:600px;
  margin:auto;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

h2 {
  font-size: 22px;
  font-weight: 700;
  margin: 0;
  display: flex;
  align-items: center;
}

.admin-btn {
  background: rgba(30,41,59,0.6);
  padding: 12px 18px;          /* bigger */
  border-radius: 12px;         /* slightly rounder */
  color: #60a5fa;
  text-decoration: none;
  font-size: 18px;             /* bigger text */
  font-weight: 600;
  border: 1px solid rgba(96,165,250,0.3);

  box-shadow:
    0 0 12px rgba(96,165,250,0.4),
    inset 0 0 6px rgba(255,255,255,0.05);

  display: inline-flex;
  align-items: center;
  gap: 6px;                    /* spacing if you add icon */
}

.admin-btn:hover {
  transform: translateY(-1px);
  box-shadow:
    0 0 20px rgba(96,165,250,0.6),
    inset 0 0 8px rgba(255,255,255,0.08);
}

.card {
  position: relative;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  background: rgba(15, 23, 42, 0.7);
  backdrop-filter: blur(14px);
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 16px;

  border: 1px solid rgba(96,165,250,0.25);

  box-shadow:
    0 0 25px rgba(59,130,246,0.25),
    0 0 60px rgba(59,130,246,0.15),
    inset 0 0 15px rgba(255,255,255,0.04);
}

.card::before {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: 18px;
  background: linear-gradient(
    120deg,
    rgba(59,130,246,0.6),
    rgba(168,85,247,0.4),
    rgba(59,130,246,0.6)
  );
  opacity: 0.25;
  filter: blur(8px);
  z-index: -1;
}

.card:hover {
  transform: translateY(-4px) scale(1.01);

  box-shadow:
    0 0 40px rgba(59,130,246,0.45),
    0 0 80px rgba(59,130,246,0.25),
    inset 0 0 20px rgba(255,255,255,0.05);
}

.user {
  font-size:22px;
  font-weight:bold;
  margin-bottom:6px;
}

.usage {
  font-size:20px;
  opacity:0.8;
}

.bar-bg {
  background: rgba(255,255,255,0.05);
  height: 26px;
  border-radius: 999px;
  margin-top: 10px;
  overflow: hidden;
}

.bar-fill {
  box-shadow: 
    0 0 10px rgba(255,255,255,0.2),
  background-blend-mode: overlay;
  position: relative;
  overflow: hidden;
  height: 100%;
  border-radius: 999px;
  font-size: 14px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #000;
  transition: width 0.4s ease;
  background-size: 200% 100%;
  animation: flow 3s linear infinite;
}

@keyframes flow {
  0% {
    background-position: 0% 50%;
  }
  100% {
    background-position: 200% 50%;
  }
}

.bar-fill::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.25),
    transparent
  );
  animation: shimmer 3s infinite;
}

@keyframes shimmer {
  0% {
    left: -100%;
  }
  100% {
    left: 100%;
  }
}

@media (max-width:480px) {
  .container { padding:10px; }
  h2 { font-size:16px; }
  .user { font-size:18px; }
  .usage { font-size:14px; }
  .bar-bg { height:26px; }
  .bar-fill { line-height:18px; }
}

body {
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h2>
    👥 Usage
    <span id="statusDot" style="margin-left:6px;">⚪</span>
    <span id="statusTime" style="font-size:12px; opacity:0.7; margin-left:4px;"></span>
  </h2>
  <a href="/data/admin/" class="admin-btn">⚙ Admin</a>
</div>

<div id="list">Loading...</div>

</div>

<script>
function bytesToGB(bytes) {
  return bytes / 1e9;
}

async function load() {
  try {
    const usersRes = await fetch('/data/users.json?t=' + Date.now());
    const users = await usersRes.json();

    const payRes = await fetch('/data/users-pay.json?t=' + Date.now());
    let payData = {};

    try {
      payData = await payRes.json();
    } catch(e) {}

    const dataRes = await fetch('/data/bandix-public.json?t=' + Date.now());

    if (!dataRes.ok) throw new Error("HTTP " + dataRes.status);

    const text = await dataRes.text();

    if (!text || text.trim() === "") {
      document.getElementById('list').innerText = 'No data yet';
      return;
    }

    let json;
    try {
      json = JSON.parse(text);
      updateStatus(json.ts_ms || 0);
    } catch (e) {
      console.error("BAD JSON:", text);
      document.getElementById('list').innerText = 'Invalid data';
      return;
    }

    let devices = Array.isArray(json.devices) ? json.devices : [];

    /* ✅ FIX: filter ALL router/self devices */
    devices = devices.filter(d =>
      d.ip &&
      !d.ip.endsWith(".1") &&
      d.mac
    );

    let grouped = {};

    devices.forEach(d => {
      const mac = d.mac.toLowerCase();

      const rx = Number(d.wan_rx_bytes || 0);
      const tx = Number(d.wan_tx_bytes || 0);

      if (!grouped[mac]) grouped[mac] = 0;
      grouped[mac] += rx + tx;
    });

    const multiplier = users._multiplier || 1;

    let userList = [];

    for (let user in users) {
      if (
        user === "_multiplier" ||
        user.startsWith("_")
      ) continue;

      let totalBytes = 0;
      let macs = users[user].macs || [];

      macs.forEach(mac => {
        totalBytes += grouped[mac.toLowerCase()] || 0;
      });

      userList.push({
        name: user,
        totalBytes: totalBytes
      });
    }

    userList.sort((a,b) => b.totalBytes - a.totalBytes);

    const list = document.getElementById('list');
    list.innerHTML = '';

    let grandTotalGB = 0;

    userList.forEach(entry => {
      const user = entry.name;

      const totalGB = (entry.totalBytes / 1e9) * multiplier;
      grandTotalGB += totalGB;

      const quota = users[user].quota ?? 1;

      let percent = (totalGB / quota) * 100;
      if (percent > 100) percent = 100;

      const over = totalGB > quota;

      let color = 'linear-gradient(90deg, #16a34a, #4ade80)';
      if (percent > 70) color = 'linear-gradient(90deg, #facc15, #f97316)';
      if (percent > 90) color = 'linear-gradient(90deg, #ef4444, #b91c1c)';

      const div = document.createElement('div');
      div.className = 'card';

      div.innerHTML = `
        <div class="user">
          ${user} ${over ? '🔴' : ''} ${payData.paid && payData.paid[user] ? '💰' : ''}
        </div>

        <div class="usage">
          ${totalGB.toFixed(2)} GB / ${quota} GB (${percent.toFixed(0)}%)
        </div>

        <div class="bar-bg">
          <div class="bar-fill" style="width:${percent}%; background:${color};">
            ${percent.toFixed(0)}%
          </div>
        </div>
      `;

      list.appendChild(div);
    });

    const totalDiv = document.createElement('div');
    totalDiv.className = 'card';
    totalDiv.style.border = '1px solid rgba(96,165,250,0.5)';
    totalDiv.style.boxShadow = '0 0 20px rgba(96,165,250,0.4)';

    totalDiv.innerHTML = `
      <div class="user">📊 Total Usage</div>
      <div class="usage">${grandTotalGB.toFixed(2)} GB</div>
    `;

    list.appendChild(totalDiv);

  } catch (e) {
    console.error("LOAD ERROR:", e);
    document.getElementById('list').innerText = 'Error loading data';
  }
}

function updateStatus(ts_ms) {
  const dot = document.getElementById('statusDot');
  const time = document.getElementById('statusTime');

  if (!dot || !time) return;

  if (!ts_ms) {
    dot.innerHTML = '⚪';
    time.innerHTML = '';
    return;
  }

  const now = Date.now();
  const diff = now - ts_ms;

  const TEN_MIN = 10 * 60 * 1000;

  // ✅ format time
  const date = new Date(ts_ms);
  const formatted = date.toLocaleTimeString([], {
    hour: '2-digit',
    minute: '2-digit'
  });

  time.innerHTML = `Last Update: ${formatted}`;

  if (diff < TEN_MIN) {
    dot.innerHTML = '🟢';
  } else {
    dot.innerHTML = '🔴';
  }
}

setInterval(load, 2000);
load();

window.addEventListener('storage', function(e) {
  if (e.key === 'users_updated') {
    load();
  }
});
</script>

</body>
</html>
